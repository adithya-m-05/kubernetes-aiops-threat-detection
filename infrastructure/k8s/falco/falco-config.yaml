# =============================================================================
# Falco Custom Rules — ConfigMap
# =============================================================================
# Purpose:
#   Defines custom Falco detection rules tailored to our containerized
#   testbed. These rules generate JSON alerts that feed into our ML pipeline.
#
# Rule Design Philosophy:
#   Each rule targets a specific MITRE ATT&CK Container technique:
#   - T1059: Command and Scripting Interpreter → shell spawning
#   - T1552: Unsecured Credentials → sensitive file reads
#   - T1611: Escape to Host → mount namespace breakout
#   - T1046: Network Service Discovery → port scanning
#   - T1496: Resource Hijacking → crypto mining processes
#
# Alert Format:
#   Falco outputs JSON with fields: rule, output, priority, time,
#   output_fields (container.id, k8s.pod.name, proc.name, fd.name, etc.)
#   Our log_aggregator.py parses these fields into a unified schema.
#
# References:
#   - Falco Default Rules: https://github.com/falcosecurity/rules
#   - MITRE ATT&CK Containers: https://attack.mitre.org/matrices/enterprise/containers/
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-rules
  namespace: aiops-security
  labels:
    app: falco
    project: aiops-threat-intelligence
data:
  falco_rules.local.yaml: |
    # ===========================================================================
    # Custom AIOps Threat Intelligence Rules
    # ===========================================================================

    # ---- Rule 1: Shell Spawned in Container ----
    # MITRE ATT&CK: T1609 (Container Administration Command)
    # Rationale:
    #   Legitimate containers rarely spawn interactive shells. A shell exec
    #   inside a running container often indicates an attacker has gained
    #   initial access and is performing reconnaissance or exploitation.
    - rule: Shell Spawned in Container (AIOps)
      desc: >
        Detect shell processes (bash, sh, zsh, csh) spawned inside a
        container. This is a high-fidelity signal for container compromise
        as production containers should not have interactive shell sessions.
      condition: >
        spawned_process and container and
        proc.name in (bash, sh, zsh, csh, ksh, dash) and
        not proc.pname in (crond, sshd)
      output: >
        Shell spawned in container
        (user=%user.name command=%proc.cmdline pid=%proc.pid
        container_id=%container.id container_name=%container.name
        pod=%k8s.pod.name namespace=%k8s.ns.name
        image=%container.image.repository)
      priority: WARNING
      tags: [container, shell, mitre_execution, T1609]

    # ---- Rule 2: Sensitive File Access ----
    # MITRE ATT&CK: T1552.001 (Credentials in Files)
    # Rationale:
    #   Access to /etc/shadow, /etc/passwd, or Kubernetes service account
    #   tokens from within a container indicates credential harvesting.
    - rule: Sensitive File Read in Container (AIOps)
      desc: >
        Detect reads to sensitive files that may contain credentials.
        Containers should access secrets through Kubernetes Secrets, not
        by reading system files directly.
      condition: >
        open_read and container and
        (fd.name startswith /etc/shadow or
         fd.name startswith /etc/passwd or
         fd.name startswith /var/run/secrets or
         fd.name startswith /proc/self)
      output: >
        Sensitive file read in container
        (user=%user.name file=%fd.name command=%proc.cmdline
        container_id=%container.id pod=%k8s.pod.name
        namespace=%k8s.ns.name)
      priority: CRITICAL
      tags: [container, filesystem, mitre_credential_access, T1552]

    # ---- Rule 3: Container Escape Attempt ----
    # MITRE ATT&CK: T1611 (Escape to Host)
    # Rationale:
    #   Attempts to access the host filesystem via /proc/1/root or mount
    #   new namespaces indicate a container escape in progress. This is
    #   one of the most critical threats in containerized environments.
    - rule: Container Escape via Procfs (AIOps)
      desc: >
        Detect attempts to escape the container sandbox by accessing
        the host's process namespace through /proc/1/root or by
        creating new mount/PID namespaces. This is a critical security
        event that warrants immediate automated response.
      condition: >
        container and
        (fd.name startswith /proc/1/root or
         fd.name startswith /proc/sysrq-trigger or
         evt.type in (setns, unshare))
      output: >
        Container escape attempt detected
        (user=%user.name command=%proc.cmdline file=%fd.name
        container_id=%container.id pod=%k8s.pod.name
        namespace=%k8s.ns.name syscall=%evt.type)
      priority: CRITICAL
      tags: [container, escape, mitre_privilege_escalation, T1611]

    # ---- Rule 4: Unexpected Network Connection ----
    # MITRE ATT&CK: T1046 (Network Service Discovery)
    # Rationale:
    #   Containers connecting to unexpected external IPs or performing
    #   port scans indicate lateral movement or data exfiltration.
    - rule: Unexpected Outbound Connection (AIOps)
      desc: >
        Detect outbound network connections from containers to external
        IP addresses. In a properly configured cluster, containers
        should only communicate with known internal services.
      condition: >
        outbound and container and
        not (fd.sip.name in (
          "cluster.local", "kube-dns.kube-system",
          "kubernetes.default"
        ))
      output: >
        Unexpected outbound connection from container
        (command=%proc.cmdline connection=%fd.name
        container_id=%container.id pod=%k8s.pod.name
        namespace=%k8s.ns.name dest_ip=%fd.rip dest_port=%fd.rport)
      priority: WARNING
      tags: [container, network, mitre_discovery, T1046]

    # ---- Rule 5: Crypto Mining Process Detection ----
    # MITRE ATT&CK: T1496 (Resource Hijacking)
    # Rationale:
    #   Cryptocurrency miners are a common payload in container attacks.
    #   Detection is based on known miner binary names and command-line
    #   patterns (stratum protocol, mining pool addresses).
    - rule: Crypto Mining Process in Container (AIOps)
      desc: >
        Detect known cryptocurrency mining processes inside containers.
        This is a strong indicator of resource hijacking where the
        attacker uses compromised container compute for mining.
      condition: >
        spawned_process and container and
        (proc.name in (xmrig, minerd, cpuminer, ethminer, cgminer) or
         proc.cmdline contains "stratum+tcp" or
         proc.cmdline contains "mining.pool")
      output: >
        Crypto mining process detected in container
        (command=%proc.cmdline pid=%proc.pid
        container_id=%container.id pod=%k8s.pod.name
        namespace=%k8s.ns.name user=%user.name)
      priority: CRITICAL
      tags: [container, cryptomining, mitre_impact, T1496]

    # ---- Rule 6: Privilege Escalation via Setuid ----
    # MITRE ATT&CK: T1068 (Exploitation for Privilege Escalation)
    # Rationale:
    #   Execution of setuid binaries or capability changes within a
    #   container can indicate privilege escalation attempts.
    - rule: Privilege Escalation Attempt (AIOps)
      desc: >
        Detect execution of setuid/setgid binaries or attempts to
        modify process capabilities within a container.
      condition: >
        container and
        (evt.type in (setuid, setgid, setreuid, setresuid) or
         (spawned_process and proc.is_exe_upper_layer=true))
      output: >
        Privilege escalation attempt in container
        (user=%user.name command=%proc.cmdline syscall=%evt.type
        container_id=%container.id pod=%k8s.pod.name
        namespace=%k8s.ns.name)
      priority: CRITICAL
      tags: [container, privilege_escalation, mitre_privilege_escalation, T1068]
