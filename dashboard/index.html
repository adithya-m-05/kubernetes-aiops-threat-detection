<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOps SOC Dashboard — Threat Intelligence</title>
  <meta name="description" content="AI-powered Security Operations Center dashboard for real-time Kubernetes threat detection, MITRE ATT&CK mapping, and automated response.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">

    <!-- ═══════════════ Sidebar ═══════════════ -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__brand-icon">⛨</div>
        <div>
          <div class="sidebar__brand-text">AIOps SOC</div>
          <div class="sidebar__brand-sub">Threat Intelligence</div>
        </div>
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__section-label">Monitoring</div>

        <div class="nav-item active" data-section="overview">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Dashboard
        </div>

        <div class="nav-item" data-section="alerts">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Live Alerts
          <span class="nav-item__badge" id="alert-badge">0</span>
        </div>

        <div class="nav-item" data-section="entities">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
          Entity Status
        </div>

        <div class="sidebar__section-label">Response</div>

        <div class="nav-item" data-section="responses">
          <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Response Log
        </div>
      </nav>

      <div class="sidebar__footer">
        <div class="text-xs text-tertiary">AIOps Threat Intelligence v1.0</div>
        <div class="text-xs text-tertiary" style="margin-top:4px">© 2026 FYP Project</div>
      </div>
    </aside>

    <!-- ═══════════════ Main Wrapper ═══════════════ -->
    <div class="main-wrapper">

      <!-- Header -->
      <header class="header">
        <div class="header__left">
          <h1 class="header__title" id="header-title">Dashboard Overview</h1>
          <div class="header__live-badge">
            <span class="header__live-dot"></span>
            LIVE
          </div>
        </div>
        <div class="header__right">
          <span class="header__time" id="header-time">--:--:-- UTC</span>
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
            <span id="theme-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </span>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">

        <!-- ── Section: Overview ─────────────────── -->
        <section class="dashboard-section active" id="section-overview">

          <!-- Summary Cards -->
          <div class="grid-4" id="summary-cards" style="margin-bottom: var(--sp-6);">
            <!-- rendered by JS -->
          </div>

          <!-- Charts Row -->
          <div class="grid-2" style="margin-bottom: var(--sp-6);">
            <div class="panel">
              <div class="panel__header">
                <div class="panel__title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  Activity Over Time
                </div>
              </div>
              <div class="chart-wrapper">
                <canvas id="activity-chart"></canvas>
              </div>
            </div>
            <div class="panel">
              <div class="panel__header">
                <div class="panel__title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                  Attack Distribution
                </div>
              </div>
              <div class="chart-wrapper">
                <canvas id="distribution-chart"></canvas>
              </div>
            </div>
          </div>

          <!-- Threat Progression -->
          <div id="threat-progression">
            <!-- rendered by JS -->
          </div>
        </section>

        <!-- ── Section: Alerts ───────────────────── -->
        <section class="dashboard-section" id="section-alerts">
          <div id="alerts-section-content">
            <!-- rendered by JS -->
          </div>
        </section>

        <!-- ── Section: Entities ─────────────────── -->
        <section class="dashboard-section" id="section-entities">
          <div class="section-header">
            <div class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
              Pod / Entity Status
            </div>
          </div>
          <div id="entities-content">
            <!-- rendered by JS -->
          </div>
        </section>

        <!-- ── Section: Responses ────────────────── -->
        <section class="dashboard-section" id="section-responses">
          <div id="responses-content">
            <!-- rendered by JS -->
          </div>
        </section>

      </main>
    </div>

    <!-- ═══════════════ Detail Side Panel ═══════════════ -->
    <div class="detail-overlay" id="detail-overlay"></div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-panel__header">
        <div class="detail-panel__title">Alert Details</div>
        <button class="detail-panel__close" id="detail-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="detail-panel__body">
        <!-- rendered by JS -->
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
